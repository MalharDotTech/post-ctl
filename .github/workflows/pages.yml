name: pages

# Deploy the docs site to Cloudflare Pages on push to main. Bundles a copy of
# scripts/install.sh alongside index.html so <pages-url>/install.sh resolves.
# Requires (repo settings): secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID,
# and a Pages project named "postctl". Domain wiring is out of scope — the
# default <project>.pages.dev URL is fine. Until secrets exist this is a no-op.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/install.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip when Cloudflare isn't configured yet (fork/pre-provision safety).
    if: ${{ vars.CLOUDFLARE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble publish dir
        run: |
          mkdir -p public
          cp -R site/* public/
          cp scripts/install.sh public/install.sh
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=postctl
